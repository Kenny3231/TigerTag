update_spool_weight:
  name: "Mettre à jour le poids d'une bobine"
  description: "Met à jour le poids restant. Si Twin Tag, les deux puces sont mises à jour."
  fields:
    uid:
      name: "UID de la bobine"
      description: "Identifiant unique (visible dans les attributs de l'entité)."
      required: true
      selector:
        text:
    weight:
      name: "Poids net (grammes)"
      description: "Poids de filament restant, sans la tare."
      required: true
      selector:
        number:
          min: 0
          max: 99999
          step: 1
          unit_of_measurement: g
          mode: box
    container_weight:
      name: "Poids du support (grammes)"
      description: "Mettre 0 si déjà déduit. Défaut : 0."
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 9999
          step: 1
          unit_of_measurement: g
          mode: box

set_bambu_ams_filament:
  name: "Assigner une bobine à un emplacement AMS"
  description: "Envoie les informations TigerTag vers un emplacement AMS Bambu Lab."
  fields:
    uid:
      name: "UID de la bobine"
      required: true
      selector:
        text:
    tray_entity_id:
      name: "Entité de l'emplacement AMS"
      description: "ex: sensor.p2s_ams_1_emplacement_1"
      required: true
      selector:
        entity:
          domain: sensor
    tray_info_idx:
      name: "Profil filament Bambu (optionnel)"
      description: "ex: GFL96"
      required: false
      selector:
        text:

set_spool_rack:
  name: "Définir le rack d'une bobine"
  description: "Associe une bobine à un rack de stockage Firestore, avec son étage et sa position. Retire automatiquement l'occupant du slot et propage au twin si présent."
  fields:
    uid:
      name: "UID de la bobine"
      required: true
      selector:
        text:
    rack_id:
      name: "ID du rack"
      description: "ID Firestore du rack (laisser vide pour retirer du rack)."
      required: false
      selector:
        text:
    level:
      name: "Étage"
      description: "Étage dans le rack (0 = premier étage). Obligatoire si rack_id est fourni."
      required: false
      selector:
        number:
          min: 0
          max: 99
          step: 1
          mode: box
    position:
      name: "Position"
      description: "Position dans l'étage (commence à 1). Obligatoire si rack_id est fourni."
      required: false
      selector:
        number:
          min: 0
          max: 999
          step: 1
          mode: box

set_spool_tare:
  name: "Définir la tare d'une bobine"
  description: "Poids de la bobine vide (masterspool custom)."
  fields:
    uid:
      name: "UID de la bobine"
      required: true
      selector:
        text:
    tare:
      name: "Tare (grammes)"
      required: true
      selector:
        number:
          min: 0
          max: 2000
          step: 1
          unit_of_measurement: g
          mode: box

fetch_bambu_profiles:
  name: "Récupérer les profils filament Bambu"
  description: "Récupère et score les profils disponibles sur l'imprimante pour une bobine."
  fields:
    device_id:
      name: "ID de l'appareil Bambu Lab"
      required: true
      selector:
        text:
    uid:
      name: "UID de la bobine"
      required: true
      selector:
        text:

refresh:
  name: "Rafraîchir l'inventaire TigerTag"
  description: "Force une mise à jour immédiate depuis Firebase."
